name: issue-template-close

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  close-non-compliant:
    runs-on: ubuntu-latest
    steps:
      - name: Close overdue non-compliant issues
        uses: actions/github-script@v7
        with:
          script: |
            const complianceLabel = "needs:compliance";
            const complianceMarker = "<!-- issue-template-compliance -->";
            const deadlineMs = 2 * 60 * 60 * 1000;
            const now = Date.now();

            let issues = [];
            try {
              issues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                labels: complianceLabel,
                state: "open",
                per_page: 100,
              });
            } catch (error) {
              if (error.status === 404) {
                core.info("Label needs:compliance does not exist, nothing to close.");
                return;
              }
              throw error;
            }

            for (const issue of issues) {
              if (issue.pull_request) {
                continue;
              }

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                per_page: 100,
              });

              const complianceComment = comments.find(comment =>
                comment.body && comment.body.includes(complianceMarker),
              );

              if (!complianceComment) {
                core.info(`Issue #${issue.number} has label but no compliance comment, skipping.`);
                continue;
              }

              const elapsedMs = now - new Date(complianceComment.created_at).getTime();
              if (elapsedMs < deadlineMs) {
                core.info(`Issue #${issue.number} still within compliance window.`);
                continue;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: "由于未在 2 小时内补全模板必填信息，这个 issue 已自动关闭。请整理后按中文 Issue 模板重新提交。",
              });

              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issue.number,
                  name: complianceLabel,
                });
              } catch (error) {
                if (error.status !== 404) {
                  throw error;
                }
              }

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed",
                state_reason: "not_planned",
              });

              core.info(`Closed overdue non-compliant issue #${issue.number}.`);
            }
