name: 缺陷反馈
description: 反馈实际存在的问题、异常或回归
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        请尽量把问题写短、写清楚。
        `BUG` 日志为必填项：请把软件根目录下的 `log/` 文件夹压缩成一个压缩包，然后直接拖到下方“日志压缩包或日志内容”输入框中上传。

  - type: checkboxes
    id: module
    attributes:
      label: 涉及模块
      description: 可多选，工作流会自动补对应标签。
      options:
        - label: 标准库
        - label: 非标准库
        - label: MetaTube
        - label: 扫描整理
        - label: UI
        - label: 其它

  - type: input
    id: version
    attributes:
      label: 软件版本号
      description: 请填写当前软件版本、便携包名或提交号。
      placeholder: 例如 0.15.1
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题
      description: 直接描述你遇到的现象。
      placeholder: 例如扫描后界面一直显示处理中，但库内影片没有新增。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 操作方式 / 复现方式
      description: 简要写出你是怎么操作后出现这个问题的。
      placeholder: |
        1. 打开……
        2. 点击……
        3. 看到……
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 日志压缩包或日志内容
      description: 必填。请把软件根目录下的 `log/` 文件夹压缩后上传到这里，也可以补充关键报错截图或日志片段。
      placeholder: 请把压缩包直接拖到这个输入框中上传
    validations:
      required: true
