name: 功能建议
description: 提交新功能、交互改进或现有行为优化建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        请尽量精简描述，重点写“你遇到的问题”和“你现在是怎么操作的”。

  - type: checkboxes
    id: module
    attributes:
      label: 涉及模块
      description: 可多选，工作流会自动补对应标签。
      options:
        - label: 标准库
        - label: 非标准库
        - label: MetaTube
        - label: 扫描整理
        - label: UI
        - label: 其它

  - type: input
    id: version
    attributes:
      label: 软件版本号
      description: 请填写当前软件版本、便携包名或提交号。
      placeholder: 例如 0.15.1
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 问题 / 建议内容
      description: 直接写你想解决的问题，或者你希望增加什么能力。
      placeholder: 例如批量扫描入口太深，希望在库列表页直接触发。
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 当前操作方式 / 使用场景
      description: 说明你现在是怎么操作的，或者这个需求出现在哪个使用场景里。
      placeholder: 例如现在需要逐个进入库详情页点扫描，连续整理多个库时很慢。
    validations:
      required: true
