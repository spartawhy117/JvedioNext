name: 使用咨询
description: 提交使用问题、配置疑问或行为确认
title: "[Question] "
labels:
  - question
body:
  - type: markdown
    attributes:
      value: |
        请尽量精简描述，重点写“你的问题”和“你现在是怎么操作的”。

  - type: checkboxes
    id: module
    attributes:
      label: 涉及模块
      description: 可多选，工作流会自动补对应标签。
      options:
        - label: 标准库
        - label: 非标准库
        - label: MetaTube
        - label: 扫描整理
        - label: UI
        - label: 其它

  - type: textarea
    id: question
    attributes:
      label: 问题
      description: 把问题直接写清楚，避免只写“不能用”“没效果”之类的短句。
      placeholder: 例如导入用户数据后，为什么某些影片不会自动触发完整重抓？
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: 软件版本号
      description: 请填写当前软件版本、便携包名或提交号。
      placeholder: 例如 0.15.1
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 当前操作方式 / 已尝试内容
      description: 说明你现在是怎么操作的，或者已经尝试过哪些步骤。
      placeholder: 例如已经重新扫描库、检查 MetaTube 地址、查看 worker 日志。
    validations:
      required: true
